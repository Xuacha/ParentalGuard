#   → "Gradle JDK": change from "jbr-xx" to a standalone JDK 17
#      (download from https://adoptium.net if you don't have one)
# OR uncomment the line below with your JDK 17 path:
# org.gradle.java.home=C:/Program Files/Java/jdk-17
